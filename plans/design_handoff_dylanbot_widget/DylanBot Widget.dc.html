<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    @keyframes db-blink { 0%,100% { opacity:1 } 50% { opacity:.3 } }
    .db-scroll::-webkit-scrollbar { width: 6px; }
    .db-scroll::-webkit-scrollbar-thumb { background: #3a3320; }
    .db-scroll::-webkit-scrollbar-track { background: transparent; }
  </style>
</helmet>

<div style="position:fixed;inset:0;background:#0a0d12;background-image:linear-gradient(rgba(232,185,35,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(232,185,35,0.05) 1px,transparent 1px);background-size:36px 36px;overflow:hidden;font-family:'Press Start 2P',monospace">

  <div style="position:absolute;top:28px;left:32px;color:#e8b923;font-size:11px;letter-spacing:1px">DYLANBOT · WIDGET STATES</div>
  <div style="position:absolute;top:52px;left:32px;color:#5b6270;font-size:9px;letter-spacing:1px;line-height:1.8">Click the arrow to toggle open / closed.</div>

  <div style="position:fixed;bottom:24px;right:24px;width:302px;display:flex;flex-direction:column;align-items:stretch;box-shadow:0 12px 32px rgba(0,0,0,0.5)">

    <div style="background:#0d1119;border:2px solid #e8b923;border-bottom:{{ headerBorderBottom }};display:flex;align-items:center;gap:10px;padding:11px 12px">
      <div style="color:#e8b923;font-size:11px;letter-spacing:1px;flex:1">DYLANBOT</div>
      <div style="width:7px;height:7px;background:#4ade80;flex:none;animation:db-blink 2s infinite"></div>
      <sc-if value="{{ showBadge }}" hint-placeholder-val="{{ false }}">
        <div style="min-width:18px;height:18px;background:#f2c14e;border:2px solid #0d1119;color:#14181f;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0 3px;flex:none">{{ unread }}</div>
      </sc-if>
      <button onClick="{{ toggle }}" style="width:24px;height:24px;flex:none;background:#0d1119;border:2px solid #e8b923;color:#e8b923;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0" style-hover="background:#1a1f2b">{{ arrowChar }}</button>
    </div>

    <sc-if value="{{ expanded }}" hint-placeholder-val="{{ true }}">
      <div style="background:#0d1119;border:2px solid #e8b923;border-top:none;display:flex;flex-direction:column;height:400px">

        <div class="db-scroll" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px">
          <sc-for list="{{ messages }}" as="msg" hint-placeholder-count="1">
            <div style="align-self:{{ msg.align }};max-width:82%;background:{{ msg.bg }};border:2px solid {{ msg.border }};color:{{ msg.color }};font-size:9px;line-height:1.8;padding:8px 10px">{{ msg.text }}</div>
          </sc-for>

          <sc-if value="{{ showSuggestions }}" hint-placeholder-val="{{ true }}">
            <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
              <sc-for list="{{ suggestions }}" as="s" hint-placeholder-count="3">
                <button onClick="{{ s.onClick }}" style="background:#0d1119;border:2px solid #e8b923;color:#e8b923;font-family:'Press Start 2P',monospace;font-size:9px;padding:10px 8px;text-align:left;cursor:pointer" style-hover="background:#1a1f2b">{{ s.label }}</button>
              </sc-for>
            </div>
          </sc-if>
        </div>

        <div style="border-top:2px solid #e8b923;display:flex;gap:8px;padding:10px">
          <input value="{{ inputValue }}" onChange="{{ onInputChange }}" onKeyDown="{{ onInputKeyDown }}" placeholder="Ask DylanBot..." style="flex:1;background:#05070a;border:2px solid #3a3320;color:#f2f0e8;font-family:'Press Start 2P',monospace;font-size:9px;padding:8px;outline:none" />
          <button onClick="{{ sendMessage }}" style="background:#f2c14e;border:2px solid #0d1119;color:#14181f;font-family:'Press Start 2P',monospace;font-size:9px;padding:0 12px;cursor:pointer" style-hover="background:#e8b923">SEND</button>
        </div>

        <div style="border-top:2px solid #2a2618;display:flex;justify-content:space-between;padding:10px 12px;font-size:8px">
          <div style="display:flex;gap:8px">
            <a href="#" style="color:#e8b923;text-decoration:underline">FULL CHAT</a>
            <span style="color:#5b6270">·</span>
            <a href="#" style="color:#e8b923;text-decoration:underline">DOCS</a>
          </div>
          <a href="#" style="color:#5b6270;text-decoration:underline">LEAVE MSG</a>
        </div>
      </div>
    </sc-if>

  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 900, &quot;height&quot;: 650}}">
class Component extends DCLogic {
  state = {
    expanded: false,
    unread: 2,
    inputValue: '',
    showSuggestions: true,
    messages: [
      { from: 'bot', text: "Howdy! Ask me about Dylan's skills, projects, or this platform \u2014 or tap a suggestion below." }
    ]
  };

  toggle = () => {
    this.setState(s => ({ expanded: !s.expanded, unread: s.expanded ? s.unread : 0 }));
  };

  onInputChange = (e) => this.setState({ inputValue: e.target.value });

  onInputKeyDown = (e) => { if (e.key === 'Enter') this.sendMessage(); };

  reply = (text) => {
    let r = "Got it \u2014 I'll dig that up for you.";
    if (/skill/i.test(text)) r = "Dylan works across React, TypeScript, and pixel-perfect front-end craft. Check the Projects page for proof.";
    else if (/project/i.test(text)) r = "Dylan's shipped a handful of retro-styled web projects \u2014 head to the Projects tab to see them.";
    else if (/resume/i.test(text)) r = "You can grab Dylan's resume from the Resume tab in the sidebar.";
    return r;
  };

  sendMessage = () => {
    const text = this.state.inputValue.trim();
    if (!text) return;
    const reply = this.reply(text);
    this.setState(s => ({
      inputValue: '',
      showSuggestions: false,
      messages: [...s.messages, { from: 'user', text }, { from: 'bot', text: reply }]
    }));
  };

  askSuggestion = (label) => {
    const reply = this.reply(label);
    this.setState(s => ({
      showSuggestions: false,
      messages: [...s.messages, { from: 'user', text: label }, { from: 'bot', text: reply }]
    }));
  };

  renderVals() {
    const suggestionLabels = ["Show me Dylan's skills", "Show me Dylan's projects", "How do I get the resume?"];
    return {
      expanded: this.state.expanded,
      unread: this.state.unread,
      showBadge: !this.state.expanded && this.state.unread > 0,
      arrowChar: this.state.expanded ? '\u25BC' : '\u25B2',
      headerBorderBottom: this.state.expanded ? 'none' : '2px solid #e8b923',
      toggle: this.toggle,
      inputValue: this.state.inputValue,
      onInputChange: this.onInputChange,
      onInputKeyDown: this.onInputKeyDown,
      sendMessage: this.sendMessage,
      showSuggestions: this.state.showSuggestions,
      suggestions: suggestionLabels.map(label => ({ label, onClick: () => this.askSuggestion(label) })),
      messages: this.state.messages.map(m => ({
        text: m.text,
        align: m.from === 'user' ? 'flex-end' : 'flex-start',
        bg: m.from === 'user' ? '#f2c14e' : '#0d1119',
        border: m.from === 'user' ? '#f2c14e' : '#3a3320',
        color: m.from === 'user' ? '#14181f' : '#f2f0e8'
      }))
    };
  }
}

</script>
</body>
</html>
